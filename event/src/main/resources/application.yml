spring:
  application:
    name: devticket-event
  profiles:
    active: local
  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v1/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

outbox:
  # Scheduler fallback 폴링 주기 (ms). 정상 발행은 afterCommit 직접 발행 경로가 담당하므로 보수적으로 설정.
  poll-interval-ms: 60000
  # 직접 발행 경로 동작 시간 확보용 grace period (s). 이 시간 안에 SENT 처리되지 못한 row 만 fallback 대상.
  publish-grace-seconds: 5

logging:
  file:
    name: ./spring-logs/event/event.log
