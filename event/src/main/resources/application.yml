spring:
  application:
    name: devticket-event
  profiles:
    active: local
  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v1/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  file:
    name: ./spring-logs/event/event.log
