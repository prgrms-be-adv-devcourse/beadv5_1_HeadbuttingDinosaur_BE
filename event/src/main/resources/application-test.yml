spring:
  datasource:
    # H2 메모리 DB를 사용하되, PostgreSQL 모드로 동작하도록 설정
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS event
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        default_schema: event

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 1s
    socket-timeout: 1s

  openai:
    embedding:
      enabled: true
      api-key: ${OPENAI_API_KEY:}
      model: text-embedding-3-small
      url: https://api.openai.com/v1/embeddings

  kafka:
    bootstrap-servers: localhost:9093
    consumer:
      group-id: devticket-event
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Outbox Producer 타임아웃 완화값 — EmbeddedKafka 부팅 지연 흡수 위해 운영값(500/1000/1500/2000) 대비 상향
# 불변식: max-block-ms < request-timeout-ms ≤ delivery-timeout-ms < send-timeout-ms
kafka:
  outbox-producer:
    max-block-ms: 3000
    request-timeout-ms: 5000
    delivery-timeout-ms: 8000
    send-timeout-ms: 10000

# 테스트 환경 — Scheduler fallback 빠르게 동작하도록 단축 (운영: 60s/5s)
outbox:
  poll-interval-ms: 1000
  publish-grace-seconds: 0

service:
  member:
    url: http://member:8081
  admin:
    url: http://admin:8087
  ai:
    url: http://ai:8088
