spring:
  application:
    name: devticket-log
  profiles:
    active: local

server:
  port: 8086

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  file:
    name: ./spring-logs/log/log.log
