name: CD - Gateway Service

on:
  push:
    branches: [ "devticket-gateway" ]
    paths: [ "apigateway/**" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./apigateway/gradlew

      - name: Build with Gradle
        run: |
          cd apigateway
          ./gradlew clean bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE_BASE=${{ secrets.DOCKERHUB_USERNAME }}/devticket-gateway
          docker build -t ${IMAGE_BASE}:${SHORT_SHA} -t ${IMAGE_BASE}:latest ./apigateway
          docker push ${IMAGE_BASE}:${SHORT_SHA}
          docker push ${IMAGE_BASE}:latest

      - name: Deploy
        run: |
          IMAGE_URL=${{ secrets.DOCKERHUB_USERNAME }}/devticket-gateway:latest
          docker pull $IMAGE_URL
          docker stop devticket-gateway || true
          docker rm devticket-gateway || true
          docker run -d \
            --name devticket-gateway \
            --network host \
            --restart always \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            -e JAVA_OPTS="-Xms256m -Xmx512m" \
            $IMAGE_URL
          docker image prune -f

      - name: Health Check
        run: |
          echo "Waiting for gateway to start..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Gateway is healthy!"
              exit 0
            fi
            echo "Attempt $i/20 - waiting 3s..."
            sleep 3
          done
          echo "Gateway health check failed!"
          docker logs devticket-gateway --tail 50
          exit 1