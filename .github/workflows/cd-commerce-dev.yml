name: CD - Commerce (Dev)
on:
  push:
    branches: ["develop/commerce"]
    paths: ["commerce/**"]

jobs:
  deploy:
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build
        run: |
          chmod +x ./commerce/gradlew
          cd commerce
          ./gradlew clean bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/devticket-domain-commerce:dev
          docker build -t $IMAGE ./commerce
          docker push $IMAGE

      - name: Deploy to k3s
        run: |
          sudo /usr/local/bin/k3s kubectl -n devticket set image deployment/commerce commerce=${{ secrets.DOCKERHUB_USERNAME }}/devticket-domain-commerce:dev
          sudo /usr/local/bin/k3s kubectl -n devticket scale deployment/commerce --replicas=1
          sudo /usr/local/bin/k3s kubectl -n devticket rollout restart deployment/commerce
          sudo /usr/local/bin/k3s kubectl -n devticket rollout status deployment/commerce --timeout=120s
