name: CD - Admin (AWS k3s)

on:
  push:
    branches: ["devticket-admin"]
    paths:
      - "admin/**"
      - ".github/workflows/cd-admin-aws.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SERVICE_NAME: admin
      DEPLOYMENT_NAME: admin
      CONTAINER_NAME: admin
      DIR_NAME: admin
      IMAGE_NAME: devticket-domain-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
          cache-dependency-path: |
            admin/**/*.gradle*
            admin/**/gradle-wrapper.properties

      - name: Build Spring Boot jar
        run: |
          chmod +x ./${DIR_NAME}/gradlew
          cd ${DIR_NAME}
          ./gradlew clean bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          IMAGE_SHA=${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${{ github.sha }}
          IMAGE_LATEST=${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:latest

          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" ./${DIR_NAME}

          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_INFRA_SSH_KEY }}" > ~/.ssh/aws_infra_key
          chmod 600 ~/.ssh/aws_infra_key
          ssh-keyscan -H "${{ secrets.AWS_INFRA_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to AWS k3s
        run: |
          IMAGE_SHA=${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${{ github.sha }}

          ssh -i ~/.ssh/aws_infra_key \
            "${{ secrets.AWS_INFRA_USER }}@${{ secrets.AWS_INFRA_HOST }}" \
            "sudo /usr/local/bin/k3s kubectl -n devticket set image deployment/${DEPLOYMENT_NAME} ${CONTAINER_NAME}=${IMAGE_SHA} && \
             sudo /usr/local/bin/k3s kubectl -n devticket scale deployment/${DEPLOYMENT_NAME} --replicas=1 && \
             sudo /usr/local/bin/k3s kubectl -n devticket rollout status deployment/${DEPLOYMENT_NAME} --timeout=180s && \
             sudo /usr/local/bin/k3s kubectl -n devticket get pods -l app=${SERVICE_NAME} -o wide"
