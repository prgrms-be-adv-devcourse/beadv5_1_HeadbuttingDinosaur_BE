name: CD - Payment Service

on:
  push:
    branches: [ "devticket-payment" ]
    paths: [ "payment/**" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./payment/gradlew

      - name: Build with Gradle
        run: |
          cd payment
          ./gradlew clean bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_URL=${{ secrets.DOCKERHUB_USERNAME }}/devticket-domain-payment:latest
          docker build -t $IMAGE_URL ./payment
          docker push $IMAGE_URL

      - name: Deploy
        run: |
          IMAGE_URL=${{ secrets.DOCKERHUB_USERNAME }}/devticket-domain-payment:latest
          docker pull $IMAGE_URL
          docker stop devticket-payment || true
          docker rm devticket-payment || true
          docker run -d \
            --name devticket-payment \
            --network host \
            --restart always \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e DB_URL=jdbc:postgresql://localhost:5432/devticket?currentSchema=payment \
            -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            -e KAFKA_BOOTSTRAP_SERVERS=localhost:9092 \
            -e PG_SECRET_KEY=${{ secrets.PG_SECRET_KEY }} \
            $IMAGE_URL
          docker image prune -f
