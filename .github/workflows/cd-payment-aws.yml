name: CD - Payment (AWS k3s)

on:
  push:
    branches: ["devticket-payment"]
    paths:
      - "payment/**"
      - ".github/workflows/cd-payment-aws.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-payment-aws
  cancel-in-progress: true

env:
  SERVICE_NAME: payment
  DEPLOYMENT_NAME: payment
  CONTAINER_NAME: payment
  DIR_NAME: payment
  IMAGE_NAME: devticket-domain-payment

jobs:
  build:
    name: Build and Push payment Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"
          cache-dependency-path: |
            payment/**/*.gradle*
            payment/**/gradle-wrapper.properties

      - name: Build Spring Boot jar
        run: |
          chmod +x ./${DIR_NAME}/gradlew
          cd ${DIR_NAME}
          ./gradlew clean bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          IMAGE_SHA="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${{ github.sha }}"
          IMAGE_LATEST="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:latest"

          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" ./${DIR_NAME}

          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

  deploy:
    name: Deploy payment to AWS k3s
    needs: build
    runs-on: [self-hosted, aws, k3s, infra]

    steps:
      - name: Deploy to AWS k3s
        run: |
          IMAGE_SHA="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${{ github.sha }}"

          if [ -z "$IMAGE_SHA" ]; then
            echo "ERROR: IMAGE_SHA is empty"
            exit 1
          fi

          sudo /usr/local/bin/k3s kubectl -n devticket set image \
            deployment/${DEPLOYMENT_NAME} \
            ${CONTAINER_NAME}=${IMAGE_SHA}

          sudo /usr/local/bin/k3s kubectl -n devticket scale \
            deployment/${DEPLOYMENT_NAME} \
            --replicas=1

          sudo /usr/local/bin/k3s kubectl -n devticket rollout status \
            deployment/${DEPLOYMENT_NAME} \
            --timeout=180s

          sudo /usr/local/bin/k3s kubectl -n devticket get pods \
            -l app=${SERVICE_NAME} \
            -o wide

      - name: Print deployed image
        run: |
          sudo /usr/local/bin/k3s kubectl -n devticket get deployment/${DEPLOYMENT_NAME} \
            -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo
