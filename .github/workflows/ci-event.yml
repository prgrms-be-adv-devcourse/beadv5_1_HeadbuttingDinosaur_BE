name: CI - Event Service

# 트리거: 명시된 브랜치로 PR이 생성되거나 업데이트될 때 실행
on:
  pull_request:
    branches:
      - 'develop/event'
      - 'devticket-event'
    # paths:
    #   - 'devticket-event/**' # (선택) 해당 서비스 디렉토리의 코드가 변경될 때만 트리거되도록 제한

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
        ports:
          - 9200:9200
        options: >-
          --health-cmd="curl -fsS http://localhost:9200/_cluster/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 의존성 다운로드 캐싱 (빌드 속도 최적화)

      - name: 3. Grant execute permission for gradlew
        run: chmod +x event/gradlew

      - name: 4. Gradle Test
        run: cd event && ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_ELASTICSEARCH_URIS: http://localhost:9200

      - name: 5. Gradle Build
        run: cd event && ./gradlew build -x test
