name: CI - Event Service
on:
  pull_request:
    branches:
      - 'develop/event'
      - 'devticket-event'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 의존성 다운로드 캐싱 (빌드 속도 최적화)

      - name: 3. Grant execute permission for gradlew
        run: chmod +x event/gradlew

      - name: 4. Gradle Test
        run: cd event && ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: 5. Gradle Build & SpotBugs
        run: cd event && ./gradlew build spotbugsMain -x test

      - name: 6. Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report-event
          path: event/build/reports/spotbugs/
