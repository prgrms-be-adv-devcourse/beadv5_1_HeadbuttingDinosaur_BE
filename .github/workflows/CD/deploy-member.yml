name: CD - Member Service (GHCR)

on:
  push:
    # [트리거] 'devticket-member' 브랜치에 코드가 머지(Push)될 때 실행
    branches: [ "devticket-member" ]
    # [필터] member 폴더 내부 파일이 변경된 경우에만 이 워크플로우를 가동
    paths: [ "member/**" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    # GHCR에 이미지를 업로드(write)하기 위해 필요한 GitHub 기본 권한 설정
    permissions:
      contents: read
      packages: write

    steps:
      # [1단계] Checkout: 현재 리포지토리의 소스 코드를 가상 서버로 복사
      - name: Checkout code
        uses: actions/checkout@v4

      # [2단계] Setup JDK 21: 자바 21 환경 설치 및 빌드 속도 최적화(cache)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # [3단계] Gradle 빌드: 실행 가능한 JAR 파일(.jar) 생성
      - name: Grant execute permission for gradlew
        run: chmod +x ./member/gradlew # 실행 권한 부여

      - name: Build with Gradle
        run: |
          cd member
          ./gradlew clean bootJar # 테스트를 제외한 실제 실행 파일 빌드

      # [4단계] GHCR 로그인: GitHub 내부 저장소에 이미지를 올리기 위한 인증
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # 워크플로우 실행자 아이디 자동 사용
          password: ${{ secrets.GITHUB_TOKEN }} # 별도 등록 필요 없는 자동 생성 보안 토큰

      # [5단계] Docker 이미지 빌드 및 GHCR 업로드
      - name: Build and Push Docker Image
        run: |
          # GHCR 주소는 대문자를 허용하지 않으므로 소문자로 강제 변환
          LOWER_REPO=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_URL=ghcr.io/$LOWER_REPO/devticket-member:latest
          
          # 팀원이 작성한 member/Dockerfile을 사용하여 이미지 빌드
          docker build -t $IMAGE_URL ./member
          # 빌드된 이미지를 GHCR 저장소로 전송
          docker push $IMAGE_URL

      # [6, 7, 8단계] EC2 SSH 접속 및 실제 배포 실행
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}        # 서버 IP (GitHub Secrets에 등록 필요)
          username: ${{ secrets.EC2_USERNAME }} # 서버 접속 계정 (예: ubuntu)
          key: ${{ secrets.EC2_SSH_KEY }}      # 서버 접속 .pem 키 내용
          script: |
            # 8-1. 서버에서도 GHCR 접근을 위해 로그인 (패키지가 Private인 경우 대비)
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 주소 소문자 변환 처리
            IMAGE_URL=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/devticket-member:latest
            
            # 8-2. 최신 이미지 서버로 가져오기
            docker pull $IMAGE_URL
            
            # 7. 기존 컨테이너 중지 및 삭제 (무중단 배포 전 단계)
            docker stop devticket-member || true
            docker rm devticket-member || true
            
            # 8-3. 새 컨테이너 실행 (보여주신 스크린샷의 Secrets 변수들을 환경변수로 주입)
            # member 포트: 8081 / 컨테이너명: devticket-member
            docker run -d \
              --name devticket-member \
              -p 8081:8081 \
              --restart always \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SPRING_DATASOURCE_URL='${{ secrets.DB_URL }}' \
              -e SPRING_DATASOURCE_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e SPRING_DATASOURCE_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET_KEY }}' \
              -e KAFKA_BOOTSTRAP_SERVERS='${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}' \
              $IMAGE_URL
            
            # 미사용 구버전 이미지 삭제 (EC2 용량 관리)
            docker image prune -f