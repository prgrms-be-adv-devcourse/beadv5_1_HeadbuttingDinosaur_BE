name: CD - Gateway Service

on:
  push:
    branches: [ "devticket-gateway" ]
    paths: [ "gateway/**" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gateway/gradlew

      - name: Build with Gradle
        run: |
          cd gateway
          ./gradlew clean bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_URL=${{ secrets.DOCKERHUB_USERNAME }}/devticket-gateway:latest
          docker build -t $IMAGE_URL ./gateway
          docker push $IMAGE_URL

      - name: Deploy
        run: |
          IMAGE_URL=${{ secrets.DOCKERHUB_USERNAME }}/devticket-gateway:latest
          docker pull $IMAGE_URL
          docker stop devticket-gateway || true
          docker rm devticket-gateway || true
          docker run -d \
            --name devticket-gateway \
            --network host \
            --restart always \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            $IMAGE_URL
          docker image prune -f