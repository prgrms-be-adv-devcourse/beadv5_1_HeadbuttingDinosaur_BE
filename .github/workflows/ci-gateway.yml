name: CI - Gateway Service

on:
  pull_request:
    branches:
      - 'develop/gateway'
      - 'devticket-gateway'
    paths:
      - 'apigateway/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apigateway

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: 4. Gradle Test
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 5. Gradle Build
        run: ./gradlew build -x test