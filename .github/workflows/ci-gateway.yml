name: CI - Gateway Service

# 트리거: 명시된 브랜치로 PR이 생성되거나 업데이트될 때 실행
on:
  pull_request:
    branches:
      - 'develop/gateway'
      - 'devticket-gateway'
    # paths:
    #   - 'devticket-gateway/**' # (선택) 해당 서비스 디렉토리의 코드가 변경될 때만 트리거되도록 제한

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 의존성 다운로드 캐싱 (빌드 속도 최적화)

      - name: 3. Grant execute permission for gradlew
        run: chmod +x apigateway/gradlew

      - name: 4. Gradle Test
        run: ./gradlew :apigateway:test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 5. Gradle Build
        run: ./gradlew :apigateway:build -x test