name: CD - AI (Dev)
on:
  push:
    branches: ["develop/ai"]
    paths: ["ai/**"]

jobs:
  deploy:
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build
        run: |
          chmod +x ./ai/gradlew
          cd ai
          ./gradlew clean bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/devticket-domain-ai:dev
          docker build -t $IMAGE ./ai
          docker push $IMAGE

      - name: Deploy to k3s
        run: |
          sudo /usr/local/bin/k3s kubectl -n devticket set image deployment/ai ai=${{ secrets.DOCKERHUB_USERNAME }}/devticket-domain-ai:dev
          sudo /usr/local/bin/k3s kubectl -n devticket scale deployment/ai --replicas=1
          sudo /usr/local/bin/k3s kubectl -n devticket rollout restart deployment/ai
          sudo /usr/local/bin/k3s kubectl -n devticket rollout status deployment/ai --timeout=120s
