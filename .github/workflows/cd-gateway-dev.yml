name: CD - Gateway (Dev)
on:
  push:
    branches: ["develop"]
    paths: ["apigateway/**"]

jobs:
  deploy:
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build
        run: |
          chmod +x ./apigateway/gradlew
          cd apigateway
          ./gradlew clean bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/devticket-gateway:dev
          docker build -t $IMAGE ./apigateway
          docker push $IMAGE

      - name: Deploy to k3s
        run: |
          sudo /usr/local/bin/k3s kubectl -n devticket set image deployment/gateway gateway=${{ secrets.DOCKERHUB_USERNAME }}/devticket-gateway:dev
          sudo /usr/local/bin/k3s kubectl -n devticket rollout restart deployment/gateway
          sudo /usr/local/bin/k3s kubectl -n devticket rollout status deployment/gateway --timeout=120s
