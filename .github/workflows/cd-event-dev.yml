name: CD - Event (Dev)
on:
  push:
    branches: ["develop/event"]
    paths: ["event/**"]

jobs:
  deploy:
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build
        run: |
          chmod +x ./event/gradlew
          cd event
          ./gradlew clean bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/devticket-domain-event:dev
          docker build -t $IMAGE ./event
          docker push $IMAGE

      - name: Deploy to k3s
        run: |
          sudo /usr/local/bin/k3s kubectl -n devticket set image deployment/event event=${{ secrets.DOCKERHUB_USERNAME }}/devticket-domain-event:dev
          sudo /usr/local/bin/k3s kubectl -n devticket scale deployment/event --replicas=1
          sudo /usr/local/bin/k3s kubectl -n devticket rollout restart deployment/event
          sudo /usr/local/bin/k3s kubectl -n devticket rollout status deployment/event --timeout=120s