name: CD - Admin (Dev)
on:
  push:
    branches: ["develop/admin"]
    paths: ["admin/**"]

jobs:
  deploy:
    runs-on: [self-hosted, local]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build
        run: |
          chmod +x ./admin/gradlew
          cd admin
          ./gradlew clean bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/devticket-domain-admin:dev
          docker build -t $IMAGE ./admin
          docker push $IMAGE

      - name: Deploy to k3s
        run: |
          sudo /usr/local/bin/k3s kubectl -n devticket set image deployment/admin admin=${{ secrets.DOCKERHUB_USERNAME }}/devticket-domain-admin:dev
          sudo /usr/local/bin/k3s kubectl -n devticket scale deployment/admin --replicas=1
          sudo /usr/local/bin/k3s kubectl -n devticket rollout restart deployment/admin
          sudo /usr/local/bin/k3s kubectl -n devticket rollout status deployment/admin --timeout=120s
