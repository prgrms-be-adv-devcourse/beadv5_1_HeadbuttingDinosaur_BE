name: CI - Log Service
 
# 트리거: 명시된 브랜치로 PR이 생성되거나 업데이트될 때 실행
on:
  pull_request:
    branches:
      - 'develop/log'
      - 'devticket-log'
 
jobs:
  build-and-test:
    runs-on: ubuntu-latest
 
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
 
      - name: 2. Setup Node.js 21
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'
          cache-dependency-path: fastify-log/package-lock.json  # 여기

      - name: 3. Install dependencies
        run: cd fastify-log && npm ci  # 여기부터 전부

      - name: 4. Lint
        run: cd fastify-log && npm run lint

      - name: 5. Build
        run: cd fastify-log && npm run build

      - name: 6. Test
        run: cd fastify-log && npm test
