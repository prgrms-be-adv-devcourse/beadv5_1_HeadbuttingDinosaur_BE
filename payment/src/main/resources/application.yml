spring:
  application:
    name: devticket-payment
  profiles:
    active: local

server:
  port: 8084

# Kafka Producer 타임아웃 정합 (kafka-design.md §4 / outbox_fix.md §2)
# 불변식: max.block.ms < request.timeout.ms ≤ delivery.timeout.ms < send-timeout-ms
kafka-producer:
  max-block-ms: 500
  request-timeout-ms: 1000
  delivery-timeout-ms: 1500
  send-timeout-ms: 2000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs


management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  file:
    name: ./spring-logs/payment/payment.log