spring:
  application:
    name: devticket-payment
  profiles:
    active: local

server:
  port: 8084

# Kafka Producer 타임아웃 정합 (kafka-design.md §4 / outbox_fix.md §2)
# 불변식: max.block.ms < request.timeout.ms ≤ delivery.timeout.ms < send-timeout-ms
kafka-producer:
  max-block-ms: 500
  request-timeout-ms: 1000
  delivery-timeout-ms: 1500
  send-timeout-ms: 2000

# Outbox 직접 발행 우선 + 스케줄러 fallback grace period (초)
# 직접 발행 경로가 실패한 row만 스케줄러가 잡도록 createdAt < now - graceSeconds 조건에 사용.
outbox:
  publish-grace-seconds: 5

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs


management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  file:
    name: ./spring-logs/payment/payment.log