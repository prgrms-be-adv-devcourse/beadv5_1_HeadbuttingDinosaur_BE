spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/devticket?currentSchema=settlement
    username: devticket
    password: devticket
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.devticket: DEBUG

external:
  payment-base-url: http://localhost:8084
  commerce-base-url: http://localhost:8083
  member-base-url: http://localhost:8081
  event-base-url: http://localhost:8082