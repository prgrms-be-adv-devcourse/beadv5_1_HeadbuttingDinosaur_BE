spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/devticket
    username: devticket
    password: devticket
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.devticket: DEBUG

external:
  commerce-base-url: http://localhost:8085