spring:
  application:
    name: devticket-gateway
  profiles:
    active: local
  cloud:
    gateway:
      # TODO: 프론트엔드 도메인 확정 후 CORS 설정 추가
      # globalcors:
      #   cors-configurations:
      #     '[/**]':
      #       allowedOrigins: "http://localhost:3000"
      #       allowedMethods: [GET, POST, PATCH, DELETE, OPTIONS]
      #       allowedHeaders: [Authorization, Content-Type, X-Requested-With]
      #       allowCredentials: true
      #       maxAge: 3600

      routes:
        - id: member-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/users/**, /api/seller-applications/**, /api/mypage/**

        - id: event-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/events/**, /api/seller/events/**, /api/seller/settlements/**

        - id: commerce-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/cart/**, /api/orders/**, /api/tickets/**

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**, /api/wallets/**, /api/wallet/**, /api/refunds/**

        - id: settlement-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/settlements/**

        - id: log-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/logs/**

        - id: admin-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/admin/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

server:
  port: 8080

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v1/api-docs