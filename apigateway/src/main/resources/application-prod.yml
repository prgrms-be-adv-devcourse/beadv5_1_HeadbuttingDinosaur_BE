jwt:
  secret-key: ${JWT_SECRET_KEY}

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

services:
  member:
    url: ${MEMBER_SERVICE_URL}

oauth2:
  redirect-uri: ${OAUTH_REDIRECT_URI}
  access-token-ttl: 1800000
  refresh-token-ttl: 604800000

logging:
  level:
    com.devticket: INFO

# 운영 환경 Swagger 비활성화
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoint:
    health:
      show-details: never